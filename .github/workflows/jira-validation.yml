# GitHub Actions Workflow for Jira Integration
# This workflow validates PR titles and branch names follow SALIN conventions

name: Jira Integration Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate PR Title
        uses: actions/github-script@v7
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            const jiraPattern = /^SALIN-\d+:.+/;
            
            if (!jiraPattern.test(prTitle)) {
              core.setFailed(
                `❌ PR title must start with SALIN-XX: "${prTitle}"\n\n` +
                `Expected format: SALIN-123: Implement feature description\n` +
                `See docs/jira/TEAM-HANDBOOK.md for details.`
              );
            } else {
              console.log(`✅ PR title is valid: "${prTitle}"`);
            }

      - name: Validate Branch Name
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const branchPattern = /^(feature|bugfix|hotfix|chore|refactor|docs|test|spike)\/SALIN-\d+-.+/;
            
            if (!branchPattern.test(branchName)) {
              core.setFailed(
                `❌ Branch name does not follow convention: "${branchName}"\n\n` +
                `Expected format: type/SALIN-XX-short-description\n` +
                `Allowed types: feature, bugfix, hotfix, chore, refactor, docs, test, spike\n` +
                `Example: feature/SALIN-11-implement-scene-loader\n\n` +
                `See docs/jira/TEAM-HANDBOOK.md for details.`
              );
            } else {
              console.log(`✅ Branch name is valid: "${branchName}"`);
            }
